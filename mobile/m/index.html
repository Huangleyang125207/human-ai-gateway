<!DOCTYPE html>
<html lang="zh-CN" data-theme="day">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Gateway</title>
<!-- cd v0 (2026-06-25) 全套接管:5 个 js + tokens + components,GW.mount() 直接拉起 -->

<!-- PWA — 让 iOS Safari / Android Chrome 用户能"添加到主屏"作 native-like app -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#a86e46">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gateway">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="../../brand/logo.svg">

<style>
  html, body { margin: 0; height: 100%; overflow: hidden; }
  #mount { position: fixed; inset: 0; overflow: hidden; }
  #mount .gw { width: 100%; height: 100%; border-radius: 0; }
</style>

<script>window.__GATEWAY_MOBILE__ = true;</script>
<script src="../mobile-api.js?v=cf3"></script>
<link rel="stylesheet" href="./tokens.css?v=cf3">
<link rel="stylesheet" href="./components.css?v=cf3">
</head>
<body>

<div id="mount"></div>

<!-- 渲染层:marked + DOMPurify(替 gw-mock.js 极简 stub)— gw-real-bridge 后续接通 -->
<script src="../../vendor/marked.min.js"></script>
<script src="../../vendor/dompurify.min.js"></script>
<script src="../../shared/md.js"></script>

<!-- cd v0 5 件套(顺序固定:mock → widgets → journal → chat → app)-->
<script src="./gw-mock.js?v=cf3"></script>
<script src="./gw-widgets.js?v=cf3"></script>
<script src="./gw-journal.js?v=cf3"></script>
<script src="./gw-chat.js?v=cf3"></script>
<script src="./gw-app.js?v=cf3"></script>

<!-- 拉起 GW.mount(theme 跟系统主题或默认 day) -->
<script>
  (function () {
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    GW.mount(document.getElementById('mount'), { theme: prefersDark ? 'night' : 'day' });
  })();
</script>

</body>
</html>
