<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Gateway</title>
<!-- 移动原生前端 · cd 设计组装。shim 数据层 + gatewayMd 渲染,classic 单一日间。 -->
<script>window.__GATEWAY_MOBILE__ = true;</script>
<script src="../mobile-api.js?v=cdc"></script>
<link rel="stylesheet" href="./mobile.css?v=cdc">
</head>
<body>
<div class="gw" id="gw">
  <div class="gw-breath"></div>
  <div class="gw-grain"></div>

  <div class="gw-scroll" id="scroll">
    <div class="gw-top" id="top">
      <div class="gw-top-row1">
        <button class="gw-burger" id="burger" aria-label="菜单"></button>
        <div class="gw-tabs">
          <button class="gw-tab on" data-tab="journal">日记</button>
          <button class="gw-tab" data-tab="chat">对话</button>
        </div>
        <div class="gw-top-spacer"></div>
        <span class="gw-breathdot" aria-hidden="true"></span>
      </div>
      <div class="gw-dateband" id="dateband"></div>
    </div>

    <div id="journalView"></div>
    <div id="chatView" hidden></div>
  </div>

  <div class="gw-bottom" id="bottom"></div>

  <div id="toasts"></div>
  <div id="cardLayer"></div>
  <div id="menuLayer"></div>
</div>

<script src="../../vendor/marked.min.js"></script>
<script src="../../vendor/dompurify.min.js"></script>
<script src="../../shared/md.js"></script>
<script src="./mobile.js?v=cdc"></script>
</body>
</html>
