<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gateway · 葱鸭 · 半时辰复盘</title>
<link rel="icon" type="image/svg+xml" href="./brand/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./shared/style.css?v=20260527thumb">
</head>
<body>
<div id="app">

  <div class="breath" aria-hidden="true"></div>
  <div class="aura" id="aura" aria-hidden="true"></div>

  <header class="top">
    <div class="brand"><img class="brand-logo" src="./brand/logo-animated.svg" alt=""><span>Gateway</span></div>
    <nav class="days" id="days" aria-label="days"></nav>
    <button class="new-day" id="newDayBtn" aria-label="create today's journal" title="新一天">+</button>
    <button class="market" id="marketBtn" aria-label="open plugin marketplace" title="插件市场">⚙</button>
    <button class="market" id="aggregateBtn" aria-label="open tag aggregate" title="标签聚合页">⌘</button>
    <button class="sound" id="soundBtn" aria-label="ambient sound" title="AI 的呼吸声">
      <span class="sound-wave"></span>
    </button>
    <button class="thread-toggle" id="threadToggleTop" aria-label="open thread" title="跟它说点别的">
      <span class="tt-dot"></span>
    </button>
    <button class="market" id="quitBtn" aria-label="quit gateway" title="退出 Gateway(server 停)">⏻</button>
  </header>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("quitBtn")?.addEventListener("click", async () => {
        if (!confirm("退出 Gateway?\nserver 会关掉,网页就不响应了 — 想再用得重新双击 Gateway.app。")) return;
        try {
          await fetch("/api/quit", { method: "POST" });
          document.body.innerHTML = '<div style="font:14px var(--sans); color:var(--ink-4); padding:80px; text-align:center;">Gateway 已停。<br><br>关掉这个页面即可。<br>下次想用,双击 Applications/Gateway。</div>';
        } catch (e) {
          // server 关掉时连接 abort 是正常的 — 已退出
          document.body.innerHTML = '<div style="font:14px var(--sans); color:var(--ink-4); padding:80px; text-align:center;">Gateway 已停。</div>';
        }
      });
    });
  </script>

  <main class="page">
    <section class="head" id="head">
      <div class="ord">载入中⋯</div>
    </section>
    <section class="care" id="care" data-slot="top-strip"></section>
    <section class="project-panel" id="projectPanel" data-slot="project-panel"></section>
    <section class="stream" id="stream"></section>
  </main>

  <!-- permanent chat thread (default collapsed to edge tab) -->
  <aside class="thread" id="thread" aria-hidden="true">
    <div class="thread-resizer" id="threadResizer" aria-label="drag to resize" title="拖拽改宽度"></div>
    <div class="thread-tab" id="threadTab" role="button" aria-label="toggle thread">
      <span class="tab-dot"></span>
      <span class="tab-label">AI</span>
    </div>
    <header class="thread-head">
      <div class="thread-view-tabs" role="tablist">
        <button class="tvt on" data-view="chat" id="tvtChat">对话</button>
        <button class="tvt" data-view="board" id="tvtBoard">留言板<span class="tvt-dot" id="tvtBoardDot" hidden></span></button>
      </div>
      <select class="thread-model" id="threadModel" aria-label="切换模型" title="切换模型">
        <option value="">⋯</option>
      </select>
      <span class="thread-status" id="threadStatus">⋯</span>
      <a class="thread-reset" href="./reset.html" title="清空聊天记录(本浏览器 + server,不动其他)">⟲</a>
      <button class="thread-close" id="threadClose" aria-label="close">×</button>
    </header>
    <!-- view: chat (chat 流 + 输入框) -->
    <div class="thread-view chat-view on" id="chatView">
      <div class="thread-stream" id="threadStream"></div>
      <div class="thread-pending" id="threadPending"></div>
      <div class="thread-input-row">
        <button class="thread-attach" id="threadAttachBtn" aria-label="upload image" title="上传图片(也可粘贴/拖入)">📎</button>
        <input type="file" id="threadFileInput" accept="image/*" multiple hidden>
        <textarea
          class="thread-input"
          id="threadInput"
          rows="1"
          placeholder="跟它说点什么⋯  ⏎ 发送 · shift+⏎ 换行"
        ></textarea>
        <div class="thread-hint">
          <span id="threadHintLeft">点页面上任意东西 → 把它带进对话</span>
          <span>⏎</span>
        </div>
      </div>
    </div>
    <!-- view: 留言板 (AI 单向给用户的今晚复盘) -->
    <div class="thread-view board-view" id="boardView">
      <div class="board-content" id="boardContent">
        <div class="board-empty">载入中⋯</div>
      </div>
    </div>
  </aside>

  <!-- ambient overlays -->
  <div class="whisper" id="whisper" aria-hidden="true"></div>
  <div class="shrine-ornament" id="shrineOrnament" aria-hidden="true">⌘</div>
</div>

<script src="./vendor/marked.min.js" defer></script>
<script src="./vendor/dompurify.min.js" defer></script>
<script src="./shared/scroll-drag.js?v=20260517e" defer></script>
<script src="./shared/md.js?v=20260515f" defer></script>
<script src="./shared/context-menu.js?v=20260515f" defer></script>
<script src="./shared/thread.js?v=20260527thumb2" defer></script>
<script src="./shared/notes-board.js?v=20260519i" defer></script>
<script src="./shared/journal.js?v=20260519d" defer></script>
<script src="./shared/scrapbook.js?v=20260519g" defer></script>
<script src="./shared/ritual.js?v=20260518d" defer></script>
<script src="./shared/korok.js?v=20260515f" defer></script>
<script src="./shared/marketplace.js?v=20260515f" defer></script>
<script src="./shared/aggregate.js?v=20260517e" defer></script>
<script src="./shared/vault-setup.js?v=20260516a" defer></script>
<script src="./shared/vault-audit.js?v=20260517h" defer></script>
<script src="./shared/health-ping.js?v=20260517k" defer></script>
<script src="./shared/setup.js?v=20260521a" defer></script>
<script src="./shared/widget-loader.js?v=20260518c" defer></script>
<!-- pretext (ESM) — 文字绕图,bug 2 用。
     本地 vendor(原 esm.sh/@chenglou/pretext@0.0.7)。远程 CDN import 在 Tauri WebKit
     里走系统网络栈,被 Clash 的 TLS 拦截打断 → pretext-ready 永不触发 → 绕排失灵。
     vendor 后跟 marked/dompurify 一样离线可用,不依赖网络/代理。换版本:重拉 tgz 覆盖 vendor/pretext/。 -->
<script type="module">
  import * as pretext from "./vendor/pretext/layout.js";
  window.pretext = pretext;
  document.dispatchEvent(new Event("pretext-ready"));
</script>
<script src="./shared/entry-pretext-wrap.js?v=20260517b" defer></script>
</body>
</html>
