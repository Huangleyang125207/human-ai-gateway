name: Build Windows .exe

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**.html'
      - 'shared/**'
      - 'widgets/**'
      - 'vendor/**'
      - 'brand/**'
      - 'protocols/**'
      - 'tools/**'
      - 'requirements.txt'
      - 'build-win.bat'
      - '.github/workflows/build-win.yml'
    # 6.3:tag v* push 时也跑,完了直接挂 GitHub Release
    tags: ['v*']
  workflow_dispatch:

# release publish 步要写 release 资产
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install rapidocr-onnxruntime rembg pyinstaller

      - name: Build .exe with PyInstaller
        shell: cmd
        run: |
          pyinstaller ^
            --name Gateway ^
            --noconsole ^
            --noconfirm ^
            --distpath dist-pyinstaller ^
            --workpath build ^
            --add-data "index.html;." ^
            --add-data "day.html;." ^
            --add-data "reset.html;." ^
            --add-data "history.html;." ^
            --add-data "consent.html;." ^
            --add-data "shared;shared" ^
            --add-data "widgets;widgets" ^
            --add-data "vendor;vendor" ^
            --add-data "brand;brand" ^
            --add-data "protocols;protocols" ^
            --add-data ".gateway-config.example.json;." ^
            --add-data "vault_config.py;." ^
            --add-data "vault_git.py;." ^
            --add-data "history_exporter.py;." ^
            --add-data "outcome_tracker.py;." ^
            --add-data "cutout.py;." ^
            --add-data "cutout_local.py;." ^
            --add-data "ocr.py;." ^
            --add-data "ocr_local.py;." ^
            --add-data "tools;tools" ^
            --hidden-import uvicorn.logging ^
            --hidden-import uvicorn.loops.auto ^
            --hidden-import uvicorn.loops.asyncio ^
            --hidden-import uvicorn.protocols.http.h11_impl ^
            --hidden-import uvicorn.protocols.http.auto ^
            --hidden-import uvicorn.protocols.websockets.auto ^
            --hidden-import uvicorn.protocols.websockets.websockets_impl ^
            --hidden-import uvicorn.lifespan.on ^
            --hidden-import uvicorn.lifespan.off ^
            --hidden-import multipart ^
            --hidden-import email_validator ^
            --hidden-import rapidocr_onnxruntime ^
            --hidden-import rembg ^
            server.py

      - name: Zip Gateway folder (fallback,杀软拦 setup.exe 时用户备用)
        shell: pwsh
        run: |
          Compress-Archive -Path dist-pyinstaller\Gateway -DestinationPath Gateway-windows-x64.zip
          Get-Item Gateway-windows-x64.zip | Select-Object Name, @{Name='SizeMB';Expression={[math]::Round($_.Length/1MB,1)}}

      - name: Read version from tauri.conf.json
        shell: pwsh
        run: |
          $ver = (Get-Content src-tauri\tauri.conf.json | ConvertFrom-Json).version
          "GATEWAY_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "version: $ver"

      - name: Install Inno Setup
        shell: cmd
        run: choco install innosetup -y --no-progress

      - name: Compile Gateway-Setup-x.y.z-x64.exe with Inno Setup
        shell: cmd
        # PyInstaller onedir 已在 dist-pyinstaller\Gateway\,Inno 把它打成单 setup.exe。
        # 装机后:开始菜单 + 卸载注册到控制面板,装在 %LOCALAPPDATA%\Gateway,不要求 admin。
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DGatewayVersion=%GATEWAY_VERSION% installer\gateway.iss

      - name: Smoke test installer (装+起+探,fail 则阻止 release publish)
        # build 出 setup.exe 后立刻在同 runner 上 silent 装 + 双击启动 + 探端口。
        # 0.1.6 stdout None 那种 Mac dogfood 验不出的 Win-only crash 在这步会立刻 fail,
        # 后续 Upload + Publish 都不会跑,坏 setup.exe 永远进不了 GitHub Release。
        shell: pwsh
        run: |
          $setup = Get-ChildItem -Path "installer\Output\Gateway-Setup-*-x64.exe" | Select-Object -First 1
          if (-not $setup) { Write-Error "setup.exe not found"; exit 1 }
          Write-Host "smoke target: $($setup.FullName)"

          Start-Process $setup.FullName -ArgumentList '/SILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait
          $installed = "$env:LOCALAPPDATA\Gateway\Gateway.exe"
          if (-not (Test-Path $installed)) { Write-Error "install path missing"; exit 1 }
          Write-Host "OK installed"

          $proc = Start-Process $installed -PassThru
          Start-Sleep 10
          if ($proc.HasExited) {
            Write-Error "Startup crash. ExitCode=$($proc.ExitCode)"
            exit 1
          }
          Write-Host "OK process alive after 10s"

          $up = $false
          try {
            $r = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:4321/ -TimeoutSec 5
            Write-Host "OK port 4321 HTTP $($r.StatusCode)"
            $up = $true
          } catch [System.Net.WebException] {
            if ($_.Exception.Response) {
              $code = [int]$_.Exception.Response.StatusCode
              Write-Host "OK port 4321 HTTP $code"
              $up = $true
            }
          } catch { }

          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          if (-not $up) {
            Write-Error "port 4321 unreachable but process alive — sidecar bound but listener broken"
            exit 1
          }
          Write-Host "smoke pass"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Gateway-windows-x64
          path: |
            Gateway-windows-x64.zip
            installer\Output\Gateway-Setup-*-x64.exe
          retention-days: 30

      - name: Publish to GitHub Release (tag push 时)
        # tag v* push 触发,setup.exe 主推 + zip 作为兜底(杀软误报 setup.exe 时用户备用)。
        # Win 暂无代码签名,SmartScreen 会拦,点"更多信息 → 仍要运行"即可。
        # softprops/action-gh-release 幂等,跟 mac workflow 推到同一 release。
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/Gateway-Setup-*-x64.exe
            Gateway-windows-x64.zip
          draft: true
          fail_on_unmatched_files: true
          generate_release_notes: true
