name: Build Windows (Tauri + auto-update)

# 6.4 Win Tauri 化:从 PyInstaller standalone + Inno Setup 切到 Tauri 桌面壳。
# 装出来:独立窗口 + 任务栏 Gateway 图标 + 关 X 退 server + Tauri updater 跟 yanpai 同步。
# Inno Setup 那条退场 — Tauri 2 自带 NSIS installer 出 -setup.exe。
#
# 之前 PyInstaller standalone 模式留在 git history (commit b7dfae0),要复原直接看老 yml。

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**.html'
      - 'shared/**'
      - 'widgets/**'
      - 'vendor/**'
      - 'brand/**'
      - 'protocols/**'
      - 'tools/**'
      - 'src-tauri/**'
      - 'requirements.txt'
      - '.github/workflows/build-win.yml'
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps + PyInstaller
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install rapidocr-onnxruntime rembg pyinstaller

      - name: Install Rust + tauri-cli
        # Win runner 自带 rustup,只需加 target + 装 tauri-cli
        shell: cmd
        run: |
          rustup default stable
          rustup target add x86_64-pc-windows-msvc
          cargo install tauri-cli --version "^2.0" --locked

      - name: Build sidecar (PyInstaller freeze server.py → gateway-server-x86_64-pc-windows-msvc.exe)
        # build-sidecar.sh 是 bash + Mac 路径假设,Win 上 inline 跑 PyInstaller。
        # 输出文件必须按 Tauri externalBin 约定命名:binaries/gateway-server-<TRIPLE>.exe
        shell: cmd
        run: |
          pyinstaller ^
            --name gateway-server ^
            --onefile ^
            --noconsole ^
            --noconfirm ^
            --distpath dist-sidecar ^
            --workpath build-sidecar ^
            --add-data "index.html;." ^
            --add-data "day.html;." ^
            --add-data "reset.html;." ^
            --add-data "history.html;." ^
            --add-data "consent.html;." ^
            --add-data "shared;shared" ^
            --add-data "widgets;widgets" ^
            --add-data "vendor;vendor" ^
            --add-data "brand;brand" ^
            --add-data "protocols;protocols" ^
            --add-data ".gateway-config.example.json;." ^
            --add-data "vault_config.py;." ^
            --add-data "vault_git.py;." ^
            --add-data "history_exporter.py;." ^
            --add-data "outcome_tracker.py;." ^
            --add-data "cutout.py;." ^
            --add-data "cutout_local.py;." ^
            --add-data "ocr.py;." ^
            --add-data "ocr_local.py;." ^
            --add-data "tools;tools" ^
            --add-data "reference;reference" ^
            --add-data "PRIVACY.md;." ^
            --add-data "README.md;." ^
            --add-data "LICENSE;." ^
            --hidden-import uvicorn.logging ^
            --hidden-import uvicorn.loops.auto ^
            --hidden-import uvicorn.loops.asyncio ^
            --hidden-import uvicorn.protocols.http.h11_impl ^
            --hidden-import uvicorn.protocols.http.auto ^
            --hidden-import uvicorn.protocols.websockets.auto ^
            --hidden-import uvicorn.protocols.websockets.websockets_impl ^
            --hidden-import uvicorn.lifespan.on ^
            --hidden-import uvicorn.lifespan.off ^
            --hidden-import multipart ^
            --hidden-import email_validator ^
            --hidden-import rapidocr_onnxruntime ^
            --hidden-import rembg ^
            server.py
          mkdir src-tauri\binaries 2>nul
          REM --onefile 产 dist-sidecar\gateway-server.exe (单文件,自带 _internal),
          REM 而非 dist-sidecar\gateway-server\ 文件夹 + 散文件。Tauri externalBin
          REM 要单文件;onedir 模式 _internal/ 散文件 copy 不齐 sidecar 会静默崩
          REM (0.1.7-0.1.9 Win Tauri 6 轮挂这,根因)。
          copy dist-sidecar\gateway-server.exe src-tauri\binaries\gateway-server-x86_64-pc-windows-msvc.exe
          dir src-tauri\binaries

      - name: Tauri build (NSIS installer + updater)
        # Tauri 2 自带 NSIS 模板出 Gateway_X.Y.Z_x64-setup.exe + 同名 .exe.sig(updater 签名挂在 .exe 上,不是单独 .nsis.zip)
        # Win 暂无 DigiCert 代码签名,SmartScreen 会拦,跟 0.1.5/0.1.6 setup.exe 一样
        # 用户体感:"更多信息→仍要运行"
        shell: cmd
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          cargo tauri build --target x86_64-pc-windows-msvc

      - name: Read version + sig
        id: meta
        shell: pwsh
        run: |
          $ver = (Get-Content src-tauri\tauri.conf.json | ConvertFrom-Json).version
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $sig_path = Get-ChildItem -Path "src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis\*-setup.exe.sig" | Select-Object -First 1
          if ($sig_path) {
            $sig = Get-Content $sig_path.FullName -Raw
            "sig<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            $sig | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          Write-Host "version: $ver"
          Get-ChildItem -Recurse src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis\ 2>$null | Select Name, Length

      - name: Smoke test installer (装+起+探,fail 则阻止 release publish)
        # Tauri 桌面壳模式:setup.exe silent 装 → 启 Gateway.exe(Tauri WebView 拉起 sidecar)
        # → 等 sidecar 写 .gateway-port 文件 → 探动态端口 HTTP 200
        # 之前 PyInstaller standalone 直接探 4321,Tauri 给的是 bind:0 动态端口,得读 port-file
        shell: pwsh
        run: |
          $setup = Get-ChildItem -Path "src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis\*-setup.exe" | Select-Object -First 1
          if (-not $setup) { Write-Error "NSIS setup.exe not found"; exit 1 }
          Write-Host "smoke target: $($setup.FullName)"

          # NSIS silent install,/D=path 显式 install dir(NSIS 标准,必须最后参数)
          $installDir = "C:\GatewayTest"
          $proc = Start-Process $setup.FullName -ArgumentList '/S',"/D=$installDir" -Wait -PassThru
          Write-Host "installer exit code: $($proc.ExitCode)"

          # 先 dump 实际产物,排查用
          Write-Host "=== $installDir tree ==="
          if (Test-Path $installDir) {
            Get-ChildItem $installDir -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, Length | Format-Table -AutoSize | Out-String -Width 200 | Write-Host
          } else {
            Write-Host "(installDir missing)"
          }
          Write-Host "=== LOCALAPPDATA\\Gateway tree ==="
          if (Test-Path "$env:LOCALAPPDATA\Gateway") {
            Get-ChildItem "$env:LOCALAPPDATA\Gateway" -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, Length | Format-Table -AutoSize | Out-String -Width 200 | Write-Host
          } else { Write-Host "(missing)" }

          # Cargo binary name 是 'app',Tauri 可能重命名也可能不命名;搜任意 .exe 不带 name filter
          # 排除 setup.exe / unins 之类的 installer/uninstaller artifact
          $installed = $null
          foreach ($root in @("$installDir", "$env:LOCALAPPDATA\Gateway", "$env:LOCALAPPDATA\Programs\Gateway")) {
            if (-not (Test-Path $root)) { continue }
            $found = Get-ChildItem -Path $root -Recurse -Filter *.exe -ErrorAction SilentlyContinue |
                     Where-Object {
                       $_.FullName -notlike "*-setup*" -and
                       $_.FullName -notlike "*\unins*" -and
                       $_.FullName -notlike "*gateway-server*"  # sidecar binary 排除,要主 app exe
                     } |
                     Select-Object -First 1
            if ($found) { $installed = $found.FullName; break }
          }

          if (-not $installed) {
            Write-Host "=== LOCALAPPDATA 浅扫 ==="
            Get-ChildItem "$env:LOCALAPPDATA" -Depth 1 -ErrorAction SilentlyContinue |
              Select-Object FullName | Format-Table -AutoSize | Out-String -Width 200 | Write-Host
            Write-Error "No .exe found anywhere — installer exit=$($proc.ExitCode),Tauri NSIS silent install 没真装"
            exit 1
          }
          Write-Host "OK installed at $installed"

          $proc = Start-Process $installed -PassThru
          Start-Sleep 12
          if ($proc.HasExited) {
            Write-Error "Process exited within 12s — startup crash. ExitCode=$($proc.ExitCode)"
            exit 1
          }
          Write-Host "OK process alive after 12s"

          # Tauri shell + sidecar 模式,sidecar 写真实端口到 ~/.human-ai/.gateway-port
          # PyInstaller Win cold start (unpack _MEIPASS 一坨 imports) ~10-30s,给 35s 兜底
          $port_file = "$env:USERPROFILE\.human-ai\.gateway-port"
          $port = $null
          for ($i = 0; $i -lt 18; $i++) {
            if (Test-Path $port_file) {
              $port = (Get-Content $port_file -Raw).Trim()
              if ($port -match '^\d+$') { break }
            }
            Start-Sleep 2
          }
          if (-not $port) {
            Write-Host "WARN: .gateway-port not written in 36s — fallback 探默认 4321"
            $port = "4321"
          }
          Write-Host "sidecar port: $port"

          # 多探几次,sidecar uvicorn 可能晚几秒才真 bind
          $up = $false
          for ($j = 0; $j -lt 6; $j++) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing "http://127.0.0.1:$port/" -TimeoutSec 5
              Write-Host "OK port $port HTTP $($r.StatusCode)"
              $up = $true; break
            } catch [System.Net.WebException] {
              if ($_.Exception.Response) {
                $code = [int]$_.Exception.Response.StatusCode
                Write-Host "OK port $port HTTP $code"
                $up = $true; break
              }
            } catch { }
            Start-Sleep 3
          }
          if (-not $up) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            Write-Error "port $port unreachable after 18s probe — sidecar 没真 bind"
            exit 1
          }

          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          Write-Host "smoke pass"

      - name: Generate latest.json manifest (Win-side updater)
        shell: pwsh
        run: |
          $ver = "${{ steps.meta.outputs.version }}"
          $sig = @"
          ${{ steps.meta.outputs.sig }}
          "@
          $json = @{
            version = $ver
            notes = "auto-release ${{ github.sha }}"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url = "https://gateway.yanpaidb.cn/dl/Gateway_${ver}_x64-setup.exe"
              }
            }
          } | ConvertTo-Json -Depth 4
          $json | Out-File -FilePath latest-win.json -Encoding utf8
          Get-Content latest-win.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Gateway-windows-x64-${{ steps.meta.outputs.version }}
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe.sig
            latest-win.json
          retention-days: 30

      - name: Publish to GitHub Release (tag push 时)
        # tag v* push 触发,Tauri 2 NSIS 安装包 + updater 签名挂 release。
        # 跟 Mac workflow 推到同一 release,softprops 幂等 append。
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe.sig
            latest-win.json
          draft: true
          fail_on_unmatched_files: true
          generate_release_notes: true
