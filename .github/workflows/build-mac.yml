name: Build & Release Mac (Tauri + auto-update)

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**.html'
      - 'shared/**'
      - 'widgets/**'
      - 'vendor/**'
      - 'brand/**'
      - 'protocols/**'
      - 'tools/**'
      - 'requirements.txt'
      - 'src-tauri/**'
      - 'build-sidecar.sh'
      - '.github/workflows/build-mac.yml'
  workflow_dispatch:

jobs:
  build:
    # macos-14 = arm64 (Apple Silicon) runner
    # Tauri 桌面壳 + sidecar 都得在 native arch 上 build
    runs-on: macos-14
    # 6.1 改:不再 push yanpai,只 upload artifact;Tauri build cold 3-5min + 其他 step 5min
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust + tauri-cli
        # 用 rustup 装 stable + 加 aarch64-apple-darwin target;tauri-cli 走 cargo install
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-darwin
          cargo install tauri-cli --version "^2.0" --locked

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install rapidocr-onnxruntime rembg pyinstaller

      - name: Prepare .venv-build (build-sidecar.sh 依赖这个 venv)
        # 本地开发场景 venv 由 build-mac-pyinstaller.sh 建好,CI 上需要 inline 重做一次
        run: |
          python3 -m venv .venv-build
          .venv-build/bin/pip install --quiet --upgrade pip
          .venv-build/bin/pip install --quiet -r requirements.txt
          .venv-build/bin/pip install --quiet pyinstaller rapidocr-onnxruntime rembg

      - name: Build sidecar (freeze server.py)
        # 把 server.py 打成单文件 sidecar 给 Tauri externalBin 用
        run: |
          chmod +x build-sidecar.sh
          bash build-sidecar.sh

      - name: Tauri build
        # createUpdaterArtifacts=true 让 tauri 自动 sign .app.tar.gz
        # TAURI_SIGNING_PRIVATE_KEY = secret 里存的 minisign 私钥文件内容
        # TAURI_SIGNING_PRIVATE_KEY_PASSWORD = 当前 no-passphrase 模式留空
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          source "$HOME/.cargo/env"
          cargo tauri build

      - name: Read version + sig
        id: meta
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # sig 是 tauri auto-sign 出来的(没 manual minisign 步骤)
          SIG=$(cat src-tauri/target/release/bundle/macos/Gateway.app.tar.gz.sig)
          # 多行 sig 通过 GITHUB_OUTPUT 用 heredoc 传
          echo "sig<<EOF" >> $GITHUB_OUTPUT
          echo "$SIG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate latest.json manifest
        # platforms.darwin-aarch64.signature = .sig 文件全文;url 指 yanpai endpoint
        run: |
          cat > /tmp/latest.json <<EOF
          {
            "version": "${{ steps.meta.outputs.version }}",
            "notes": "auto-release ${{ github.sha }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": $(jq -Rs . <<< "${{ steps.meta.outputs.sig }}"),
                "url": "http://101.42.108.30:18080/updates/Gateway.app.tar.gz"
              }
            }
          }
          EOF
          cat /tmp/latest.json

      - name: Upload artifact (主入口 — 本机当中转站,GitHub artifact 是真分发源)
        # 6.1 改路径:GitHub Actions → yanpai 国际反向带宽实测 18-25KB/s,150M 一次
        # 推 80min 还 timeout。改成:Actions 只 upload artifact (GitHub 内部走得快),
        # 本机跑 sync 脚本 gh run download → rsync 推 yanpai (国内→国内,几秒)。
        # 完整链:Actions build → GitHub artifact → 本机 pull → yanpai → client
        uses: actions/upload-artifact@v4
        with:
          name: Gateway-mac-arm64-${{ steps.meta.outputs.version }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/Gateway.app.tar.gz
            src-tauri/target/release/bundle/macos/Gateway.app.tar.gz.sig
            /tmp/latest.json
          retention-days: 30
