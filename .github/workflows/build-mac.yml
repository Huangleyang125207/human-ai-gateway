name: Build & Release Mac (Tauri + auto-update)

on:
  # 6.2 改:mac build 转本机跑(M2 arm64 = macos-14 等价,Keychain 已有 signing identity)。
  # macos runner $0.08/min × cold build 12min ≈ $1/次,private repo free 配额一个月 ~12 次烧完。
  # 本地 cold ~5min,incremental 1-2min,更快也更省。CI 留 workflow_dispatch 作 fallback。
  # 本地脚本:scripts/build-mac-local.sh
  # 6.3 改:tag v* push 时跑,完了上 GitHub Release(给陌生用户下载)。
  push:
    tags: ['v*']
  workflow_dispatch:

# release publish 步要写 release 资产,需要 contents: write
permissions:
  contents: write

jobs:
  build:
    # macos-14 = arm64 (Apple Silicon) runner
    # Tauri 桌面壳 + sidecar 都得在 native arch 上 build
    runs-on: macos-14
    # 6.1 30min(Tauri cold 3-5min + sidecar freeze);6.2 加 notarize 等 Apple 5-15min → 45。
    # 6.3 实测一次 Apple notarytool submit 等了 30+ min 没回应被 timeout cancel,
    # 给到 90min 兜 Apple 服务慢/排队的常见情况。CI 一次成本上限 ~$7,只 tag push 时跑。
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust + tauri-cli
        # 用 rustup 装 stable + 加 aarch64-apple-darwin target;tauri-cli 走 cargo install
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-darwin
          cargo install tauri-cli --version "^2.0" --locked

      - name: Install Python deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install rapidocr-onnxruntime rembg pyinstaller

      - name: Prepare .venv-build (build-sidecar.sh 依赖这个 venv)
        # 本地开发场景 venv 由 build-mac-pyinstaller.sh 建好,CI 上需要 inline 重做一次
        run: |
          python3 -m venv .venv-build
          .venv-build/bin/pip install --quiet --upgrade pip
          .venv-build/bin/pip install --quiet -r requirements.txt
          .venv-build/bin/pip install --quiet pyinstaller rapidocr-onnxruntime rembg

      - name: Build sidecar (freeze server.py)
        # 把 server.py 打成单文件 sidecar 给 Tauri externalBin 用
        run: |
          chmod +x build-sidecar.sh
          bash build-sidecar.sh

      - name: Tauri build (codesign + notarize)
        # 6.2 起开 Apple codesign + notarize:
        # Tauri 2 见 APPLE_CERTIFICATE 自动 import 临时 keychain → sign;
        # 见 APPLE_ID+APPLE_PASSWORD+APPLE_TEAM_ID 自动 notarytool submit + staple。
        # minisign 签 .app.tar.gz(updater 用)仍走 TAURI_SIGNING_PRIVATE_KEY。
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          source "$HOME/.cargo/env"
          cargo tauri build

      - name: Read version + sig
        id: meta
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # sig 是 tauri auto-sign 出来的(没 manual minisign 步骤)。
          # 6.9 v0.1.26→v0.1.27 真测发现:.sig 文件末尾的 \n 进 manifest signature 字段
          # 后,Tauri reqwest minisign 解 base64 撞 offset 404 报"Invalid symbol 10",
          # 整套自更新链路在 v0.1.16-v0.1.25 全历史版本静默瘫痪。strip 尾部空白根治。
          SIG=$(awk 'BEGIN{ORS=""} {sub(/[ \t\r\n]+$/,""); print}' src-tauri/target/release/bundle/macos/Gateway.app.tar.gz.sig)
          # 多行 sig 通过 GITHUB_OUTPUT 用 heredoc 传
          echo "sig<<EOF" >> $GITHUB_OUTPUT
          echo "$SIG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate latest.json manifest
        # url 走 COS 直链:同腾讯云内网,实测 6+ MB/s vs CDN 回源 yanpai 250 KB/s = 24x 提速。
        # versioned path 永远不撞 cache,binary + sig 必须先于 manifest 上传(见 Upload to COS step)。
        # 6.9 v0.1.28 真测发现:bash here-string `<<<` 会在输入末尾追加 LF
        # → jq -Rs 把 LF 当 sig 内容编进 JSON `\n` → Tauri minisign 解 base64
        # 撞 offset 404 报"Invalid symbol 10"。改用直接 JSON inline + Python
        # 一刀 strip 末尾 whitespace,根治 v0.1.16-v0.1.28 历史 bug。
        # sig 是纯 base64(alphanumeric + /+ = chars),inline 进 JSON 不需要 escape。
        run: |
          SIG=$(python3 -c "import sys; sys.stdout.write(open('src-tauri/target/release/bundle/macos/Gateway.app.tar.gz.sig').read().rstrip())")
          cat > /tmp/latest.json <<EOF
          {
            "version": "${{ steps.meta.outputs.version }}",
            "notes": "auto-release ${{ github.sha }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "https://gateway-updates-1341853738.cos.ap-shanghai.myqcloud.com/v${{ steps.meta.outputs.version }}/Gateway.app.tar.gz"
              }
            }
          }
          EOF
          # verify sig 末尾确实没 \n(防 future regression)
          python3 -c "
          import json
          d = json.load(open('/tmp/latest.json'))
          sig = d['platforms']['darwin-aarch64']['signature']
          assert not sig.endswith(chr(10)), 'FATAL: sig ends with LF, minisign will reject'
          assert not sig.endswith(' '), 'FATAL: sig ends with space'
          print(f'sig OK ({len(sig)} chars, ends with {sig[-3:]!r})')
          "
          cat /tmp/latest.json

      - name: Upload to COS
        # CI 直推 COS,替代「本机当中转 → rsync yanpai」的旧架构。
        # secrets:COS_SECRET_ID / COS_SECRET_KEY 在 repo Settings → Secrets → Actions。
        # 顺序铁律:binary + sig 先于 manifest。客户端读 manifest 立刻拉 binary,半秒错位 = 404。
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          if [ -z "$COS_SECRET_ID" ] || [ -z "$COS_SECRET_KEY" ]; then
            echo "::warning::COS_SECRET_ID/COS_SECRET_KEY 未配置,跳过 COS 上传(GH artifact 还在)"
            exit 0
          fi
          pip install coscmd --quiet
          coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" \
            -b gateway-updates-1341853738 -r ap-shanghai
          V=${{ steps.meta.outputs.version }}
          # 先自更新 binary + sig
          coscmd upload src-tauri/target/release/bundle/macos/Gateway.app.tar.gz v${V}/Gateway.app.tar.gz
          coscmd upload src-tauri/target/release/bundle/macos/Gateway.app.tar.gz.sig v${V}/Gateway.app.tar.gz.sig
          # 首装包(.dmg)同时上 COS — yanpai gateway.yanpaidb.cn/dl/ Caddy redirect 指这,
          # 国内陌生用户首装也能秒拉(替代之前 GH Release / yanpai 慢源中转)
          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)
          if [ -n "$DMG" ]; then
            DMG_NAME=$(basename "$DMG")
            coscmd upload "$DMG" "v${V}/${DMG_NAME}"
            echo "✓ dmg uploaded: v${V}/${DMG_NAME}"
          fi
          # binary 就位后才 publish manifest
          # v0.1.28 起 manifest 名走 {{target}} 占位(latest-darwin-aarch64.json),
          # 同时 latest.json 作 v0.1.16-v0.1.27 老客户端兼容别名,过渡 1-2 版本再删
          coscmd upload /tmp/latest.json latest-darwin-aarch64.json
          coscmd upload /tmp/latest.json latest.json
          echo "✓ COS 上传完成:v${V}"

      - name: Verify COS upload (binary/sig/manifest 全 200)
        # coscmd exit code 不可靠(SDK 内吞过 5xx),HEAD 200 是真源验证。
        # 任一文件 404 = 自更新链路断 = 立刻 fail CI。
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
        run: |
          [ -z "$COS_SECRET_ID" ] && { echo "skip (no secrets)"; exit 0; }
          V=${{ steps.meta.outputs.version }}
          BASE=https://gateway-updates-1341853738.cos.ap-shanghai.myqcloud.com
          for url in \
            "$BASE/v${V}/Gateway.app.tar.gz" \
            "$BASE/v${V}/Gateway.app.tar.gz.sig" \
            "$BASE/latest-darwin-aarch64.json" \
            "$BASE/latest.json"; do
            curl -sIf --max-time 10 "$url" > /dev/null || { echo "✗ 404: $url"; exit 1; }
            echo "✓ $url"
          done

      - name: Upload artifact (workflow_dispatch 时走这条 → 本机 gh run download → rsync yanpai)
        # 历史:本机当中转站,GitHub Actions → 本机 pull → rsync yanpai → client。
        # 走 artifact 而非 release,因为 yanpai 路径不依赖 tag。
        # tag push 路径(下一步)直接发 GitHub Release,绕开 yanpai。
        uses: actions/upload-artifact@v4
        with:
          name: Gateway-mac-arm64-${{ steps.meta.outputs.version }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/Gateway.app.tar.gz
            src-tauri/target/release/bundle/macos/Gateway.app.tar.gz.sig
            /tmp/latest.json
          retention-days: 30

      - name: Publish to GitHub Release (tag push 时)
        # tag v* push 触发:把 codesigned + notarized .dmg 直接挂到 GitHub Release。
        # 用户从 /releases/latest 下载,双击 .dmg 装,Gatekeeper 不再警告。
        # 多 workflow(mac + win)同时推到同一 release;softprops/action-gh-release 幂等,
        # 谁先到谁建 release,后到的 append assets。
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/Gateway.app.tar.gz
            src-tauri/target/release/bundle/macos/Gateway.app.tar.gz.sig
            /tmp/latest.json
          draft: true
          fail_on_unmatched_files: true
          generate_release_notes: true
