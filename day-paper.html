<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>六月十一日 · gateway</title>
<link rel="stylesheet" href="./vendor/fonts/fonts.css" />
<script src="./shared/theme.js?v=20260612b" defer></script>
<link rel="stylesheet" href="./shared/design-tokens.css" />
<link rel="stylesheet" href="./shared/components.css" />
<link rel="stylesheet" href="./shared/context-menu-paper.css?v=20260616a" />
<style>
  /* 翻日:报头下一行,安静的纸习语(非 cd reference 件,页内作用域) */
  .day-flip {
    display: flex; justify-content: center; align-items: baseline; gap: 1.6em;
    margin-top: 0.7rem;
    font-family: var(--font-kai); font-size: 13px; letter-spacing: 0.14em;
  }
  .day-flip a {
    color: var(--ink-faint); text-decoration: none; cursor: pointer;
    transition: color 0.4s ease;
  }
  .day-flip a:hover { color: var(--cinnabar-soft); }
  .day-flip .flip-list { color: var(--ink-soft); }
  .day-flip .flip-new { color: var(--cinnabar-soft); }
  .day-flip .flip-new:hover { color: var(--cinnabar); }
  .day-flip a[hidden] { display: none; }
</style>
</head>
<body data-screen-label="单日页">

<div class="lamp" aria-hidden="true"></div>
<div class="cursor-glow" aria-hidden="true"></div>

<div class="sheet">

  <!-- ── 报头 ─────────────────────────────────── -->
  <header class="masthead">
    <p class="masthead-over ink-in" data-delay="0">GATEWAY · 人与 AI 共写的一卷</p>
    <h1 class="masthead-date ink-in" data-delay="150" id="mhDate"></h1>
    <p class="masthead-sub ink-in" data-delay="350" id="mhSub"></p>
    <div class="masthead-rule-row ink-in" data-delay="550">
      <div class="masthead-rule"></div>
      <button class="memory-ring" id="memoryRing" type="button" title="今天的对话已写满约三分之二,点一下让它把记忆压进快照">
        <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
          <circle class="ring-track" cx="11" cy="11" r="8.5" fill="none" stroke-width="1.4"></circle>
          <circle class="ring-arc" id="ringArc" cx="11" cy="11" r="8.5" fill="none" stroke-width="1.4"
                  stroke-dasharray="53.4" stroke-dashoffset="19" stroke-linecap="round"
                  transform="rotate(-90 11 11)"></circle>
        </svg>
        <span class="ring-hint">把今天的对话压进快照</span>
        <span class="ring-done">已收进快照</span>
      </button>
      <button class="mode-seal" id="modeSeal" type="button" title="换一盏灯">
        <span class="ms-char">夜</span>
      </button>
    </div>
    <nav class="day-flip" id="dayFlip" aria-label="翻日">
      <a class="flip-prev" id="flipPrev" rel="prev" hidden>‹ 前一日</a>
      <a class="flip-list" href="./index-paper.html">往日</a>
      <a class="flip-next" id="flipNext" rel="next" hidden>后一日 ›</a>
      <a class="flip-new" id="flipNew" href="#" hidden></a>
    </nav>
  </header>

  <!-- ── 晨课:widget 带(容器习语:竖排楷体小题 + 发丝线) ── -->
  <section class="morning ink-in" data-delay="750" aria-label="每日追踪" id="morning" hidden>
  </section>

  <!-- ── 一天 ─────────────────────────────────── -->
  <main class="day" id="dayMain"></main>

  <!-- ── 卷尾 ─────────────────────────────────── -->
  <footer class="colophon ink-in">
    <span class="fleuron">❦</span>
    <p>md 是真相,这一页是它的热镜像</p>
    <p id="colophonFile">在纸上改的每个字,都会写回 md 真源</p>
  </footer>

</div>

<button class="quote-chip" id="quoteChip" type="button"><span class="chip-dot"></span>引入对话</button>

<aside class="whisper" id="whisper" role="status" aria-live="polite"><i class="whale-dot"></i><span id="whisperText"></span></aside>

<script src="./shared/day-paper.js"></script>
<script src="./vendor/marked.min.js"></script>
<script src="./vendor/dompurify.min.js"></script>
<script src="./shared/md.js?v=20260612a"></script>
<!-- 右键菜单:context-menu.js 原件(同 classic),纸衣走 context-menu-paper.css → 0 迁移 -->
<script src="./shared/context-menu.js?v=20260515f"></script>
<script src="./shared/day-paper-data.js?v=20260616b"></script>

<a href="#" id="toClassic" onclick="window.gatewaySkin&&window.gatewaySkin.set('classic');return false;" style="position:fixed;right:16px;bottom:14px;font-family:var(--font-kai);font-size:12.5px;color:var(--ink-soft,#888);text-decoration:none;letter-spacing:.14em;opacity:.62;z-index:60;border-bottom:1px solid var(--hairline-strong,#ccc);padding-bottom:1px;" title="这套皮肤不合口味?切回标准版">切回标准版</a>
</body>
</html>
