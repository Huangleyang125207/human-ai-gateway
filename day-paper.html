<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>六月十一日 · gateway</title>
<link rel="stylesheet" href="./vendor/fonts/fonts.css" />
<script src="./shared/theme.js?v=20260612b" defer></script>
<link rel="stylesheet" href="./shared/design-tokens.css" />
<link rel="stylesheet" href="./shared/components.css" />
<link rel="stylesheet" href="./shared/context-menu-paper.css?v=20260616a" />
<link rel="stylesheet" href="./shared/thread-paper.css?v=20260613a" />
<link rel="stylesheet" href="./shared/marketplace-paper.css?v=20260613a" />
<script>/* thread.js / marketplace.js 在 paper 没装 toast/dialog → 垫静默 shim,缺它们时优雅降级 */
  window.gatewayToast = window.gatewayToast || function (m) { try { console.log("[toast]", m); } catch (e) {} };
  window.gatewayAlert = window.gatewayAlert || function (m) { try { window.alert(m); } catch (e) {} };</script>
<style>
  /* 翻日:报头下一行,安静的纸习语(非 cd reference 件,页内作用域) */
  .day-flip {
    display: flex; justify-content: center; align-items: baseline; gap: 1.6em;
    margin-top: 0.7rem;
    font-family: var(--font-kai); font-size: 13px; letter-spacing: 0.14em;
  }
  .day-flip a {
    color: var(--ink-faint); text-decoration: none; cursor: pointer;
    transition: color 0.4s ease;
  }
  .day-flip a:hover { color: var(--cinnabar-soft); }
  .day-flip .flip-list { color: var(--ink-soft); }
  .day-flip .flip-new { color: var(--cinnabar-soft); }
  .day-flip .flip-new:hover { color: var(--cinnabar); }
  .day-flip a[hidden] { display: none; }

  /* 横向切天条:对齐 classic 的 day-pill 习语(顶部一排天,点哪天跳哪天),纸样式。
     0 迁移 —— classic 用户的"顶部切天"肌肉记忆在 paper 一样用。 */
  .day-strip {
    display: flex; gap: 0.45em; flex-wrap: nowrap;
    overflow-x: auto; scrollbar-width: none;
    justify-content: flex-start;
    margin: 0.75rem auto 0; padding: 0.15rem 0.1rem 0.3rem;
    max-width: 30em;
  }
  .day-strip::-webkit-scrollbar { display: none; }
  .day-strip:empty { display: none; }
  .day-pill {
    flex: 0 0 auto; cursor: pointer;
    font-family: var(--font-kai); font-size: 12px; letter-spacing: 0.06em;
    color: var(--ink-faint); background: none;
    border: 1px solid transparent; border-radius: 3px;
    padding: 0.18em 0.5em;
    transition: color 0.3s ease, border-color 0.3s ease;
  }
  .day-pill:hover { color: var(--cinnabar-soft); }
  .day-pill.on { color: var(--ink); border-color: var(--hairline-strong); }

  /* 撤回式删除:专用浮层(独立于 whisper,5s 窗口) */
  .paper-undo {
    position: fixed; left: 50%; bottom: 30px; z-index: 95;
    transform: translate(-50%, 12px); opacity: 0;
    display: flex; align-items: baseline; gap: 0.7em;
    padding: 0.55rem 1.1rem;
    background: var(--paper-slip, var(--paper));
    border: 1px solid var(--hairline-strong);
    border-radius: 4px; box-shadow: var(--shadow-slip, 0 12px 34px rgba(0,0,0,0.18));
    font-family: var(--font-kai); font-size: 13px; letter-spacing: 0.06em;
    color: var(--ink-soft);
    transition: opacity 0.34s ease, transform 0.34s ease;
    pointer-events: none;
  }
  .paper-undo.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
  .paper-undo button {
    background: none; border: none; cursor: pointer; font: inherit;
    color: var(--cinnabar); letter-spacing: 0.1em;
    border-bottom: 1px solid var(--cinnabar-soft); padding: 0 0 1px;
  }
  .paper-undo button:hover { color: var(--cinnabar-soft); }
</style>
</head>
<body data-screen-label="单日页">

<div class="lamp" aria-hidden="true"></div>
<div class="cursor-glow" aria-hidden="true"></div>

<div class="sheet">

  <!-- ── 报头 ─────────────────────────────────── -->
  <header class="masthead">
    <p class="masthead-over ink-in" data-delay="0">GATEWAY · 人与 AI 共写的一卷</p>
    <h1 class="masthead-date ink-in" data-delay="150" id="mhDate"></h1>
    <p class="masthead-sub ink-in" data-delay="350" id="mhSub"></p>
    <div class="masthead-rule-row ink-in" data-delay="550">
      <div class="masthead-rule"></div>
      <button class="memory-ring" id="memoryRing" type="button" title="今天的对话已写满约三分之二,点一下让它把记忆压进快照">
        <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
          <circle class="ring-track" cx="11" cy="11" r="8.5" fill="none" stroke-width="1.4"></circle>
          <circle class="ring-arc" id="ringArc" cx="11" cy="11" r="8.5" fill="none" stroke-width="1.4"
                  stroke-dasharray="53.4" stroke-dashoffset="19" stroke-linecap="round"
                  transform="rotate(-90 11 11)"></circle>
        </svg>
        <span class="ring-hint">把今天的对话压进快照</span>
        <span class="ring-done">已收进快照</span>
      </button>
      <button class="mode-seal" id="modeSeal" type="button" title="换一盏灯">
        <span class="ms-char">夜</span>
      </button>
      <button class="paper-settings-btn" id="marketBtn" type="button" title="设置 · 钥匙 · 皮肤" aria-label="设置">⚙</button>
    </div>
    <nav class="day-flip" id="dayFlip" aria-label="翻日">
      <a class="flip-prev" id="flipPrev" rel="prev" hidden>‹ 前一日</a>
      <a class="flip-list" href="./index-paper.html">往日</a>
      <a class="flip-next" id="flipNext" rel="next" hidden>后一日 ›</a>
      <a class="flip-new" id="flipNew" href="#" hidden></a>
    </nav>
    <nav class="day-strip ink-in" id="dayStrip" data-delay="650" aria-label="切换日期"></nav>
  </header>

  <!-- ── 晨课:widget 带(容器习语:竖排楷体小题 + 发丝线) ── -->
  <section class="morning ink-in" data-delay="750" aria-label="每日追踪" id="morning" hidden>
  </section>

  <!-- ── 脉搏:项目状态行(对齐 classic 单日的 project-panel,接 /api/pulse,禁卡片) ── -->
  <section class="ink-in" data-delay="800" aria-label="项目脉搏" id="pulseOrgan" hidden>
    <h2 class="organ-head" style="margin-top: 3.4rem;">脉搏</h2>
    <ul class="pulse"></ul>
  </section>

  <!-- ── 一天 ─────────────────────────────────── -->
  <main class="day" id="dayMain"></main>

  <!-- ── 卷尾 ─────────────────────────────────── -->
  <footer class="colophon ink-in">
    <span class="fleuron">❦</span>
    <p>md 是真相,这一页是它的热镜像</p>
    <p id="colophonFile">在纸上改的每个字,都会写回 md 真源</p>
  </footer>

</div>

<!-- ── 对话:thread.js 原件驱动(脚手架 ID 同 classic/index-paper),纸衣走 thread-paper.css ──
     单日页 = 当天日记 + 常驻对话(对齐 classic 主页:journal + thread 同处)。
     streaming + past_boards 红线全在 thread.js,不动;此处只是脚手架。 -->
<!-- thread.js 无 guard 绑 #threadToggleTop;paper 主开口是折页 tab,这里隐藏占位防 null 崩 -->
<button id="threadToggleTop" hidden aria-hidden="true"></button>
<aside class="thread" id="thread" aria-hidden="true">
  <div class="thread-resizer" id="threadResizer" aria-label="拖拽改宽度" title="拖拽改宽度"></div>
  <div class="thread-tab" id="threadTab" role="button" aria-label="与鲸说话">
    <span class="tab-dot"></span>
    <span class="tab-label">与鲸说话</span>
  </div>
  <header class="thread-head">
    <div class="thread-view-tabs" role="tablist">
      <button class="tvt on" data-view="chat" id="tvtChat">对话</button>
      <button class="tvt" data-view="board" id="tvtBoard">留言板<span class="tvt-dot" id="tvtBoardDot" hidden></span></button>
    </div>
    <select class="thread-model" id="threadModel" aria-label="切换模型" title="切换模型"><option value="">⋯</option></select>
    <span class="thread-status" id="threadStatus">⋯</span>
    <a class="thread-reset" href="./reset.html" title="清空聊天记录">⟲</a>
    <button class="thread-close" id="threadClose" aria-label="收页">×</button>
  </header>
  <div class="thread-view chat-view on" id="chatView">
    <div class="thread-stream" id="threadStream"></div>
    <div class="thread-pending" id="threadPending"></div>
    <div class="thread-input-row">
      <button class="thread-attach" id="threadAttachBtn" aria-label="上传图片" title="上传图片(也可粘贴/拖入)">📎</button>
      <input type="file" id="threadFileInput" accept="image/*" multiple hidden>
      <textarea class="thread-input" id="threadInput" rows="1" placeholder="跟它说点什么⋯  ⏎ 发送 · shift+⏎ 换行"></textarea>
      <div class="thread-hint"><span id="threadHintLeft">点页面上任意东西 → 带进对话</span><span>⏎</span></div>
    </div>
  </div>
  <div class="thread-view board-view" id="boardView">
    <div class="board-content" id="boardContent"><div class="board-empty">载入中⋯</div></div>
  </div>
</aside>

<div class="img-lightbox" id="imgLightbox" hidden></div>
<button class="quote-chip" id="quoteChip" type="button"><span class="chip-dot"></span>引入对话</button>

<aside class="whisper" id="whisper" role="status" aria-live="polite"><i class="whale-dot"></i><span id="whisperText"></span></aside>

<script src="./shared/day-paper.js?v=20260616a"></script>
<script src="./vendor/marked.min.js"></script>
<script src="./vendor/dompurify.min.js"></script>
<script src="./shared/md.js?v=20260612a"></script>
<!-- 右键菜单:context-menu.js 原件(同 classic),纸衣走 context-menu-paper.css → 0 迁移 -->
<script src="./shared/context-menu.js?v=20260515f"></script>
<script src="./shared/day-paper-data.js?v=20260616f"></script>
<!-- 对话引擎:原件不动(streaming + past_boards 红线在此),scroll-drag 供 resizer,compact-ring 圆环自挂 thread-head -->
<script src="./shared/scroll-drag.js?v=20260517e"></script>
<script src="./shared/thread.js?v=20260603urlstrip"></script>
<script src="./shared/compact-ring.js"></script>
<!-- 设置:marketplace.js 原件(钥匙/模型/consent/检查更新/widget/皮肤行 全现成),纸衣走 marketplace-paper.css -->
<script src="./shared/marketplace.js?v=20260613a"></script>

<a href="#" id="toClassic" onclick="window.gatewaySkin&&window.gatewaySkin.set('classic');return false;" style="position:fixed;right:16px;bottom:14px;font-family:var(--font-kai);font-size:12.5px;color:var(--ink-soft,#888);text-decoration:none;letter-spacing:.14em;opacity:.62;z-index:60;border-bottom:1px solid var(--hairline-strong,#ccc);padding-bottom:1px;" title="这套皮肤不合口味?切回标准版">切回标准版</a>
</body>
</html>
