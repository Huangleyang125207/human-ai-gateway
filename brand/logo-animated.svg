<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="human-ai schedule animated logo">
  <title>human-ai schedule (animated)</title>
  <desc>价电子沿外圈缓慢公转 — 暗示"AI 思考中,日记仍在呼吸"。</desc>

  <!-- 纸色底 -->
  <rect width="256" height="256" fill="#f5efe3"/>

  <!-- 价电子轨道(隐形,只是参考) -->
  <!-- 4 个电子作为一组沿圆心缓慢旋转。半径 = √((200-128)² + (200-128)²) ≈ 102 -->
  <g transform="translate(128 128)">
    <g>
      <circle cx="-72" cy="-72" r="8" fill="#1a1a1a"/>
      <circle cx="72"  cy="-72" r="8" fill="#1a1a1a"/>
      <circle cx="-72" cy="72"  r="8" fill="#1a1a1a"/>
      <circle cx="72"  cy="72"  r="8" fill="#1a1a1a"/>
      <animateTransform attributeName="transform" type="rotate"
                       from="0" to="360" dur="40s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- 中央元素符号(静止) -->
  <text x="128" y="116" font-family="Georgia, 'Times New Roman', serif"
        font-size="64" font-weight="500" text-anchor="middle"
        fill="#1a1a1a" letter-spacing="-1">C</text>
  <text x="128" y="184" font-family="Georgia, 'Times New Roman', serif"
        font-size="48" font-weight="500" text-anchor="middle"
        fill="#1a1a1a" letter-spacing="-1">Si</text>

  <!-- 朱砂红键线 — 用透明度脉动暗示"连接活着" -->
  <line x1="98" y1="135" x2="158" y2="135" stroke="#b8362b" stroke-width="2.5" stroke-linecap="round">
    <animate attributeName="opacity" values="0.65;1;0.65" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>
